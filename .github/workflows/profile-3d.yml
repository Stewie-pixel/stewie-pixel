name: Regenerate 3D Contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # daily at 18:00 UTC

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: github-profile-3D-contributions
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/*.svg
          git diff-index --quiet HEAD || git commit -m "chore: regenerate 3D contributions"

      - name: Push changes
        run: |
          git push origin github-profile-3D-contributions
