name: Regenerate 3D Contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # daily at 18:00 UTC

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: chore/update-tech-badges-by-groups
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate SVGs
        run: |
          # your command to regenerate SVGs
          node generate-3d.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/*.svg
          git diff-index --quiet HEAD || git commit -m "chore: regenerate 3D contributions"

      - name: Push changes
        run: |
          git push origin chore/update-tech-badges-by-groups